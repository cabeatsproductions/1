<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C A Beats Video Upload Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
            letter-spacing: 1px;
        }
        
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }
        
        .upload-box:hover {
            border-color: #764ba2;
            background-color: #f0f0f0;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .upload-text small {
            color: #999;
            display: block;
            font-size: 14px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .reset-btn {
            background-color: #e0e0e0;
            color: #333;
        }
        
        .reset-btn:hover {
            background-color: #d0d0d0;
        }
        
        .status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .file-info {
            margin-top: 15px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 6px;
            display: none;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 C A Beats Video Upload</h1>
        
        <div class="upload-box" onclick="document.getElementById('videoFile').click()">
            <div class="upload-icon">📹</div>
            <div class="upload-text">
                Klicka här för att välja en video
                <small>eller dra och släpp en fil här</small>
            </div>
        </div>
        
        <input type="file" id="videoFile" accept="video/*">
        
        <div class="file-info" id="fileInfo"></div>
        
        <div class="button-group">
            <button class="upload-btn" onclick="uploadVideo()">Ladda upp</button>
            <button class="reset-btn" onclick="resetForm()">Rensa</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>
    
    <script>
        const videoFile = document.getElementById('videoFile');
        const fileInfo = document.getElementById('fileInfo');
        const statusDiv = document.getElementById('status');
        
        videoFile.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                const file = this.files[0];
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                fileInfo.textContent = `Fil: ${file.name} (${sizeMB} MB)`;
                fileInfo.style.display = 'block';
            }
        });
        
        function uploadVideo() {
            if (!videoFile.files || videoFile.files.length === 0) {
                showStatus('❌ Vänligen välj en videofil', 'error');
                return;
            }
            
            const file = videoFile.files[0];
            const maxSize = 500 * 1024 * 1024; // 500MB
            
            if (file.size > maxSize) {
                showStatus('❌ Filen är för stor (max 500MB)', 'error');
                return;
            }
            
            showStatus('⏳ Video laddas upp: ' + file.name, 'success');
            
            setTimeout(() => {
                showStatus('✅ Video uppladdad framgångsrikt!', 'success');
            }, 2000);
        }
        
        function resetForm() {
            videoFile.value = '';
            fileInfo.style.display = 'none';
            statusDiv.style.display = 'none';
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
        }
    </script>
</body>
</html>
